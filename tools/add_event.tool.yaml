type: tool
name: add_event
description: 添加新的日程安排。从用户的聊天记录或文档中提取时间、标题、描述等信息创建日程。
input_schema:
  type: object
  properties:
    title:
      type: string
      description: 日程标题
    start_time:
      type: string
      description: 开始时间，格式：YYYY-MM-DD HH:MM
    end_time:
      type: string
      description: 结束时间，格式：YYYY-MM-DD HH:MM
    description:
      type: string
      description: 日程详细描述
    location:
      type: string
      description: 日程地点（可选）
    reminder:
      type: integer
      description: 提前提醒时间（分钟），默认 15
  required:
    - title
    - start_time
    - end_time
