type: tool
name: parse_document
description: 从 Markdown 文件或文本中提取日程信息。可以解析聊天记录、文档等内容，自动识别时间和日程关键词。
input_schema:
  type: object
  properties:
    content:
      type: string
      description: 文档内容或文件路径
    source_type:
      type: string
      enum:
        - file
        - text
      description: 内容类型，file 表示文件路径，text 表示文本内容
  required:
    - content
    - source_type